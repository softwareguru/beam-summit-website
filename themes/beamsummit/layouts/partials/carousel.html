<section>
    <div class="sponsors text-center">
        <h2>Look back to the previous editions</h2>
    </div>

    <!-- Demo styles -->
    <style>
        .swiper-carousel {
            padding-top: 50px;
        }

        .swiper-slide {
            background-position: center;
            background-size: cover;
            width: 400px;
        }

        .swiper-slide img {
            display: block;
            width: 100%;
        }
    </style>

    <!-- Swiper -->
    <div class="swiper-carousel carousel-img">
        <div class="swiper-wrapper">

            {{ range .Site.Data.carousel.images }}
            {{ $img := resources.Get . }}

            {{ if $img }}
            {{ $webp := $img.Resize (printf "%dx webp q85" $img.Width) }}

            <div class="swiper-slide">
                <picture>
                    <source srcset="{{ $webp.RelPermalink }}" type="image/webp">
                    <img src="{{ $img.RelPermalink }}" loading="lazy">
                </picture>
            </div>
            
            {{ end }}
            {{ end }}

        </div>
    </div>
</section>

<!-- Swiper JS -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<!-- Initialize Swiper -->
<script>
    var swiper = new Swiper(".carousel-img", {
        effect: "coverflow",
        grabCursor: true,
        centeredSlides: true,
        slidesPerView: "auto",
        autoplay: {
            delay: 2500,
            disableOnInteraction: false,
        },
        coverflowEffect: {
            rotate: 50,
            stretch: 0,
            depth: 100,
            modifier: 1,
            slideShadows: true,
        },
        pagination: {
            el: ".swiper-pagination",
        },
    });
</script>
